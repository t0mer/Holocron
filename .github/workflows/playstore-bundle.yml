name: Play Bundle

# Builds a signed Android App Bundle (.aab) for upload to the Google Play Console.
# The .aab is published as a workflow artifact to download and submit for review.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (YYYY.M.PATCH). Leave blank to auto-compute."
        required: false

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for version computation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(bash scripts/next-version.sh)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bundling $VERSION"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.HOLOCRON_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::HOLOCRON_KEYSTORE_BASE64 secret is not set. See RELEASING.md."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/holocron.jks"

      - name: Build signed App Bundle
        env:
          HOLOCRON_KEYSTORE_FILE: ${{ runner.temp }}/holocron.jks
          HOLOCRON_KEYSTORE_PASSWORD: ${{ secrets.HOLOCRON_KEYSTORE_PASSWORD }}
          HOLOCRON_KEY_ALIAS: ${{ secrets.HOLOCRON_KEY_ALIAS }}
          HOLOCRON_KEY_PASSWORD: ${{ secrets.HOLOCRON_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease -PholocronVersion=${{ steps.version.outputs.version }}

      - name: Stage bundle
        run: |
          mkdir -p dist
          cp app/build/outputs/bundle/release/app-release.aab \
             "dist/holocron-${{ steps.version.outputs.version }}.aab"

      - name: Verify bundle is signed
        run: jarsigner -verify -verbose -certs dist/*.aab | grep -E "jar verified|CN=" | head -5

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: holocron-${{ steps.version.outputs.version }}-aab
          path: dist/*.aab
          retention-days: 30
          if-no-files-found: error
