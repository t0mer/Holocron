name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (YYYY.M.PATCH). Leave blank to auto-compute."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for version computation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(bash scripts/next-version.sh)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.HOLOCRON_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::HOLOCRON_KEYSTORE_BASE64 secret is not set. See RELEASING.md."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/holocron.jks"

      - name: Build signed release APK
        env:
          HOLOCRON_KEYSTORE_FILE: ${{ runner.temp }}/holocron.jks
          HOLOCRON_KEYSTORE_PASSWORD: ${{ secrets.HOLOCRON_KEYSTORE_PASSWORD }}
          HOLOCRON_KEY_ALIAS: ${{ secrets.HOLOCRON_KEY_ALIAS }}
          HOLOCRON_KEY_PASSWORD: ${{ secrets.HOLOCRON_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -PholocronVersion=${{ steps.version.outputs.version }}

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             "dist/holocron-${{ steps.version.outputs.version }}.apk"

      - name: Verify signing
        run: |
          BT="$ANDROID_SDK_ROOT/build-tools"
          APKSIGNER="$(find "$BT" -name apksigner | sort | tail -1)"
          "$APKSIGNER" verify --print-certs "dist/holocron-${{ steps.version.outputs.version }}.apk"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Holocron ${{ steps.version.outputs.version }}
          files: dist/*.apk
          generate_release_notes: true
